<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Axomic - Roblox Info Scraper</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-light">
    <div class="container">
        <header>
            <div class="logo">
                <svg class="robloxicon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="5" width="90" height="90" rx="18" fill="#cc0000" />
                    <path d="M30 25 h20 v8 h-12 v10 h8 v8 h-8 v18 h-8 v-18 h-12 v-8 h12 v-10 h-20 v-8 z" fill="white" />
                </svg>
                <span class="title">Axomic - Roblox Info Scraper</span>
            </div>
            <div class="headercontrols">
                <select id="themeselect" aria-label="theme selector">
                    <option value="theme-light">Light</option>
                    <option value="theme-dark">Dark</option>
                    <option value="theme-blue">Blue</option>
                    <option value="theme-green">Green</option>
                    <option value="theme-purple">Purple</option>
                    <option value="theme-orange">Orange</option>
                    <option value="theme-pink">Pink</option>
                    <option value="theme-forest">Forest</option>
                    <option value="theme-ocean">Ocean</option>
                    <option value="theme-sunset">Sunset</option>
                </select>
            </div>
        </header>

        <nav class="tabs">
            <button class="tabbtn active" data-tab="home">Home</button>
            <button class="tabbtn" data-tab="info">Info</button>
        </nav>

        <section id="tabhome" class="tabcontent active">
            <div class="searchsection">
                <div class="inputgroup">
                    <input type="text" id="usernameinput" placeholder="Enter Roblox username" autocomplete="off" />
                    <button id="scrapebtn">Scrape Info</button>
                </div>
                <div id="statusmsg" class="statusmsg"></div>
            </div>

            <section id="outputsection" class="outputsection hidden">
                <div id="resultcontent" class="resultcontent"></div>
            </section>
        </section>

        <section id="tabinfo" class="tabcontent">
            <div class="infocontent">
                <div class="credittext">
                    This is a Free,Open-Sourced Roblox Info Scraper by Username.
                    It is made by Axom for multi purposes.
                    If you would like to modify the source, please consider giving credit to Axom.
                </div>
                <div class="socialbuttons">
                    <a href="https://youtube.com/@axos0022" target="_blank" rel="noopener" class="socialbtn youtube">YouTube</a>
                    <a href="https://discord.gg/QAhCXgaDZg" target="_blank" rel="noopener" class="socialbtn discord">Discord</a>
                </div>
            </div>
        </section>
    </div>

    <div id="loadingoverlay" class="loadingoverlay hidden">
        <div class="spinner"></div>
        <div class="loadingtext">Scraping Info, Please Wait...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
